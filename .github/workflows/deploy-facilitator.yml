name: Deploy Facilitator

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.ref }}

jobs:
  alchemize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: |
          git -c url.https://github.com/.insteadOf=git@github.com: submodule update --init --depth 1 konfik liminal
          git -c url.https://github.com/.insteadOf=git@github.com: -C liminal submodule update --init --depth 1 konfik
      - uses: crosshatch/konfik/.github/actions/configure_environment@main
      - run: pnpm build
      - uses: crosshatch/konfik/.github/actions/alchemize@main
        with:
          working-directory: "@crosshatch/facilitator"
        env:
          CDP_API_KEY_ID: ${{ vars.CDP_API_KEY_ID }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
