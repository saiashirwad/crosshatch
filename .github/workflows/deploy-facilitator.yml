name: Deploy Facilitator

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) ||
    github.ref }}

jobs:
  alchemize:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: |
          git -c url.https://github.com/.insteadOf=git@github.com: submodule update --init --depth 1 konfik liminal
          git -c url.https://github.com/.insteadOf=git@github.com: -C liminal submodule update --init --depth 1 konfik
      - uses: crosshatch/konfik/.github/actions/configure_environment@main
      - run: pnpm build
      - uses: alchemy-run/alchemy-effect@main
        with:
          working-directory: facilitator
        env:
          CDP_API_KEY_ID: ${{ vars.CDP_API_KEY_ID }}
          CDP_API_KEY_SECRET: ${{ secrets.CDP_API_KEY_SECRET }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.MADHATCHER_PAT }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ vars.OTEL_EXPORTER_OTLP_ENDPOINT }}
          OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
          OTEL_LOGS_EXPORTER: ${{ vars.OTEL_LOGS_EXPORTER }}
          OTEL_METRICS_EXPORTER: ${{ vars.OTEL_METRICS_EXPORTER }}
          OTEL_TRACES_EXPORTER: ${{ vars.OTEL_TRACES_EXPORTER }}
          PAY_TO_EIP155: ${{ vars.PAY_TO_EIP155 }}
