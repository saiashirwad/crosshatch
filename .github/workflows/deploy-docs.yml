name: Deploy Docs

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize, closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group:
    ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) ||
    github.ref }}

jobs:
  alchemize:
    if: false # TODO: reenable
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: |
          git -c url.https://github.com/.insteadOf=git@github.com: submodule update --init --depth 1 konfik liminal
          git -c url.https://github.com/.insteadOf=git@github.com: -C liminal submodule update --init --depth 1 konfik
      - uses: crosshatch/konfik/.github/actions/configure_environment@main
      - run: pnpm build
      - uses: crosshatch/konfik/.github/actions/alchemize@main
        with:
          working-directory: docs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
