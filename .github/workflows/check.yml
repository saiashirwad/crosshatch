name: Check

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - run: |
          git -c url.https://github.com/.insteadOf=git@github.com: submodule update --init --depth 1 konfik liminal
          git -c url.https://github.com/.insteadOf=git@github.com: -C liminal submodule update --init --depth 1 konfik
      - uses: ./konfik/.github/actions/configure_environment
      - run: pnpm oxfmt --check
      - run: pnpm build
      - run: pnpm test
