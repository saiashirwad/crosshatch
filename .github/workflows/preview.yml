name: Preview
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
  push:
    branches:
      - "**"
    tags:
      - "!**"
concurrency: ${{ github.workflow }}-${{ github.ref }}
jobs:
  check:
    if: github.event_name == 'pull_request' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    outputs:
      has-permissions: ${{ steps.checkPermissions.outputs.require-result }}
    steps:
      - name: Check permissions
        id: checkPermissions
        uses: actions-cool/check-user-permission@v2
        with:
          username: ${{ github.event.pull_request.user.login }}
          require: "write"
  publish:
    needs: check
    if: needs.check.outputs.has-permissions == 'true' && !github.event.pull_request.draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - run: |
          git -c url.https://github.com/.insteadOf=git@github.com: submodule update --init --depth 1 konfik liminal
          git -c url.https://github.com/.insteadOf=git@github.com: -C liminal submodule update --init --depth 1 konfik
      - uses: crosshatch/konfik/.github/actions/configure_environment@main
      - run: pnpm build
      - run: pnpm exec pkg-pr-new publish --comment=update './@crosshatch/*' './crosshatch'
